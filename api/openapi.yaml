openapi: 3.0.3
info:
  title: TreasureHunt.Tectrix2026 API
  version: 1.0.0
  description: API contract for participant and admin workflows.
servers:
  - url: https://api.treasurehunt.example.com

paths:
  /auth/participant/register:
    post:
      summary: Register participant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterParticipantRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantSession'
        '409':
          description: Duplicate email or roll

  /auth/participant/login:
    post:
      summary: Passwordless participant login (email OTP/magic link)
      responses:
        '200':
          description: Login initiated/completed

  /groups:
    post:
      summary: Create group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [groupName]
              properties:
                groupName:
                  type: string
      responses:
        '201':
          description: Group created

  /groups/{groupId}/invitations:
    post:
      summary: Invite member by email or roll
      parameters:
        - in: path
          name: groupId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                roll:
                  type: string
      responses:
        '201': { description: Invitation created }

  /invitations/{invitationId}/accept:
    post:
      summary: Accept group invite
      parameters:
        - in: path
          name: invitationId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Joined group }

  /qr/scan:
    post:
      summary: Resolve scanned QR token to question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: QR details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QrQuestion'

  /submissions:
    post:
      summary: Submit answer for a QR
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitAnswerRequest'
      responses:
        '201':
          description: Submission recorded
        '409':
          description: Team already submitted this QR

  /admin/login:
    post:
      summary: Admin login
      responses:
        '200': { description: Authenticated }

  /admin/dashboard:
    get:
      summary: Dashboard metrics
      responses:
        '200':
          description: Live stats

  /admin/game/final-qr:
    patch:
      summary: Mark final QR
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [qrNumber]
              properties:
                qrNumber:
                  type: string
      responses:
        '200': { description: Updated }

  /admin/game/state:
    patch:
      summary: Pause/resume/close game
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [running, paused, closed]
                closeSubmissions:
                  type: boolean
      responses:
        '200': { description: State updated }

  /admin/broadcast:
    post:
      summary: Send emergency broadcast
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                channel:
                  type: string
                  enum: [in_app, sms]
      responses:
        '202': { description: Queued }

components:
  schemas:
    RegisterParticipantRequest:
      type: object
      required:
        - fullName
        - department
        - collegeEmail
        - collegeRoll
        - year
      properties:
        fullName: { type: string }
        department:
          type: string
          enum: [IT, CSE, ECE, EE, AIML, BCA, MCA, MTech]
        collegeEmail:
          type: string
          format: email
        collegeRoll:
          type: string
        year:
          type: string
          enum: [1st, 2nd, 3rd, 4th]

    ParticipantSession:
      type: object
      properties:
        participantId: { type: integer }
        participantCode: { type: string }
        sessionToken: { type: string }

    QrQuestion:
      type: object
      required: [qrNumber, question]
      properties:
        qrNumber: { type: string }
        question: { type: string }
        isFinal: { type: boolean }

    SubmitAnswerRequest:
      type: object
      required:
        - qrNumber
        - answer
        - explanation
      properties:
        qrNumber: { type: string }
        answer: { type: string, minLength: 1 }
        explanation: { type: string, minLength: 1 }
