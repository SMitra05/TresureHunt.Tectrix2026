openapi: 3.0.3
info:
  title: TreasureHunt.Tectrix2026 API
  version: 1.1.0
  description: Runnable API contract aligned with backend implementation.
servers:
  - url: http://localhost:4000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200': { description: OK }

  /auth/participant/register:
    post:
      summary: Register participant with password and create session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, department, collegeEmail, collegeRoll, year, password]
              properties:
                fullName: { type: string }
                department: { type: string }
                collegeEmail: { type: string }
                collegeRoll: { type: string }
                year: { type: string }
                password: { type: string, minLength: 8 }
      responses:
        '201': { description: Registered }

  /auth/participant/login:
    post:
      summary: Participant login with email/roll + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                collegeEmail: { type: string }
                collegeRoll: { type: string }
                password: { type: string, minLength: 8 }
      responses:
        '200': { description: Logged in }

  /auth/participant/logout:
    post:
      security: [{ bearerAuth: [] }]
      summary: Participant logout
      responses:
        '200': { description: Logged out }

  /groups:
    post:
      security: [{ bearerAuth: [] }]
      summary: Create group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [groupName]
              properties:
                groupName: { type: string }
      responses:
        '201': { description: Group created }

  /groups/{groupId}/invitations:
    post:
      security: [{ bearerAuth: [] }]
      summary: Invite member by email or roll
      parameters:
        - in: path
          name: groupId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                collegeEmail: { type: string }
                collegeRoll: { type: string }
      responses:
        '201': { description: Invitation created }

  /invitations:
    get:
      security: [{ bearerAuth: [] }]
      summary: List pending invitations
      responses:
        '200': { description: Pending invites }

  /invitations/{invitationId}/accept:
    post:
      security: [{ bearerAuth: [] }]
      summary: Accept invitation
      parameters:
        - in: path
          name: invitationId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Joined group }

  /invitations/{invitationId}/reject:
    post:
      security: [{ bearerAuth: [] }]
      summary: Reject invitation
      parameters:
        - in: path
          name: invitationId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Rejected }

  /qr/scan:
    post:
      security: [{ bearerAuth: [] }]
      summary: Resolve scanned token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        '200': { description: QR details }
        '429': { description: Too many requests }

  /submissions:
    post:
      security: [{ bearerAuth: [] }]
      summary: Submit QR answer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [qrNumber, answer, explanation]
              properties:
                qrNumber: { type: string }
                answer: { type: string }
                explanation: { type: string }
      responses:
        '201': { description: Submission created }
        '200': { description: Final QR success }
        '429': { description: Too many requests }

  /admin/login:
    post:
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string, minLength: 8 }
      responses:
        '200': { description: Logged in }

  /admin/logout:
    post:
      security: [{ bearerAuth: [] }]
      summary: Admin logout
      responses:
        '200': { description: Logged out }

  /admin/dashboard:
    get:
      security: [{ bearerAuth: [] }]
      summary: Dashboard stats
      responses:
        '200': { description: Stats }

  /admin/audit-logs:
    get:
      security: [{ bearerAuth: [] }]
      summary: Recent admin audit logs
      responses:
        '200': { description: Logs }

  /events:
    get:
      summary: SSE dashboard stream (use bearer token or `?token=`)
      responses:
        '200': { description: text/event-stream }

  /admin/game/state:
    patch:
      security: [{ bearerAuth: [] }]
      summary: Set game status and submission closure
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [running, paused, closed]
                closeSubmissions:
                  type: boolean
      responses:
        '200': { description: Updated }

  /admin/game/final-qr:
    patch:
      security: [{ bearerAuth: [] }]
      summary: Mark one QR as final
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [qrNumber]
              properties:
                qrNumber: { type: string }
      responses:
        '200': { description: Updated }

  /admin/teams/{groupId}/disqualify:
    patch:
      security: [{ bearerAuth: [] }]
      summary: Disqualify a team
      parameters:
        - in: path
          name: groupId
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        '200': { description: Disqualified }

  /admin/qr/{qrNumber}:
    patch:
      security: [{ bearerAuth: [] }]
      summary: Edit QR question/active status
      parameters:
        - in: path
          name: qrNumber
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                question: { type: string }
                isActive: { type: boolean }
      responses:
        '200': { description: Updated }

  /admin/broadcast:
    post:
      security: [{ bearerAuth: [] }]
      summary: Queue broadcast message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message: { type: string }
      responses:
        '202': { description: Queued }
